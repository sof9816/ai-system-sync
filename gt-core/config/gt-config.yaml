ai:
  primary_provider: kimi-coding
  backup_provider: openrouter
  model: kimi-k2.6
  thinking: medium

providers:
  kimi-coding:
    base_url: https://api.moonshot.cn/v1
    api_key_env: KIMI_API_KEY
    active: true
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    active: true
  anthropic:
    base_url: https://api.anthropic.com/v1
    api_key_env: ANTHROPIC_API_KEY
    active: false

skills:
  # Always load these skills at the start of every chat
  default:
    - caveman
    - brainstorming
    - obsidian
    - grill-me
    - context7

  # Project-type specific skill bundles
  project_bundles:
    ios:
      - ios-developer
      - swiftui-pro
      - swift-concurrency-pro
      - swift-testing-pro
      - xcode-build-orchestrator
      - xcode-project-analyzer
      - mobile-security-coder
      - mobile-ui
      - miswag-ios-developer
    node:
      - frontend-developer
      - testing-patterns
    python:
      - testing-patterns
    flutter:
      - mobile-ui

  # Auto-update these skills based on active project
  auto_update:
    - miswag-ios-developer
    - ios-developer

agents:
  hermes:
    skills_dir: /Users/gt/Public/MyFiles/agent-home/gt-core/skills/hermes
    config_file: /Users/gt/Public/MyFiles/agent-home/gt-core/config/hermes.yaml
    default_skills:
      - caveman
      - brainstorming
      - obsidian
      - grill-me
      - context7
  pi:
    skills_dir: /Users/gt/Public/MyFiles/agent-home/gt-core/skills/pi
    config_file: /Users/gt/Public/MyFiles/agent-home/gt-core/config/pi.yaml
    default_skills:
      - caveman
      - brainstorming
      - obsidian
      - grill-me
      - context7

integrations:
  obsidian:
    vault_path: /Users/gt/Library/Mobile Documents/iCloud~md~obsidian/Documents/Vault
  ghostty:
    config_path: /Users/gt/Library/Application Support/com.mitchellh.ghostty/config
  claude_code:
    enabled: true

secrets:
  rotation_policy: 90d
  vault_file: /Users/gt/Public/MyFiles/agent-home/gt-core/secrets/vault.yaml
